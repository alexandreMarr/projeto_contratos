
services:
  app:
    build: .
    container_name: sistema_contrato
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: production
      APP_DEBUG: true
      # Adicione outras variáveis se necessário

  